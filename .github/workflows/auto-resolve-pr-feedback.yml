name: Auto-Resolve PR Feedback

# Triggers after the Claude Code Review workflow finishes on any PR.
# The self-heal skill reads the review, fixes CRITICAL/WARNING issues, pushes,
# and loops until clean — then auto-squash-merges. Max 5 cycles, $15 budget cap.
on:
  workflow_run:
    workflows: ["Claude Code Review"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-resolve:
    name: Auto-Resolve
    runs-on: ubuntu-latest

    # Only run if the review workflow succeeded and produced a result
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Find PR number for this workflow run
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $HEAD_BRANCH — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download review result artifact
        if: steps.find-pr.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: review-result
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true
        # If the artifact doesn't exist (older PRs), defaults to WARNING below

      - name: Check review verdict
        id: check-verdict
        if: steps.find-pr.outputs.skip == 'false'
        run: |
          if [ -f review_result.txt ]; then
            VERDICT=$(cat review_result.txt | tr -d '[:space:]')
          else
            VERDICT="WARNING"
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Review verdict: $VERDICT"

      - name: Check cycle count
        id: cycle-count
        if: steps.find-pr.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIX_COMMIT_PREFIX: "fix: resolve PR review feedback"
        run: |
          COUNT=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ steps.find-pr.outputs.pr_number }}/commits" \
            --jq "[.[] | select(.commit.message | startswith(\"$FIX_COMMIT_PREFIX\"))] | length")
          echo "cycle_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Prior fix cycles: $COUNT"

      - name: Stop — cycle limit reached with unresolved critical issues
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) >= 5 &&
          steps.check-verdict.outputs.verdict == 'CRITICAL'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.find-pr.outputs.pr_number }} \
            --repo "${{ github.repository }}" \
            --body "Auto-resolution reached the 5-cycle limit. Unresolved critical issues require human review. Stopping automated loop."
          echo "Cycle limit reached with critical issues — human review required."

      - name: Auto-merge if already clean
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict == 'CLEAN'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          CHECKS=$(gh pr checks "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json state \
            --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')

          if [ "$CHECKS" -eq 0 ]; then
            PR_TITLE=$(gh pr view "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json title \
              --jq '.title')
            gh pr merge "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --squash \
              --subject "$PR_TITLE"
            echo "Auto-squash-merged PR #$PR_NUMBER — review was clean."
          else
            echo "Review clean but $CHECKS CI checks still pending — waiting for next trigger."
          fi

      - name: Checkout PR branch for fix cycle
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.find-pr.outputs.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI script dependencies
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5
        run: pip install -r .github/scripts/requirements.txt

      - name: Install project dependencies
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5
        run: pip install uv && uv sync

      - name: Configure git identity
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5
        run: |
          git config user.email "phi-scan-autofix@phi-scan.local"
          git config user.name "PhiScan Auto-Fix"

      - name: Run self-heal via SDK runner
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/self_heal_runner.py

      - name: Post result summary as PR comment
        if: |
          steps.find-pr.outputs.skip == 'false' &&
          steps.check-verdict.outputs.verdict != 'CLEAN' &&
          fromJSON(steps.cycle-count.outputs.cycle_count) < 5 &&
          always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f self_heal_result.txt ]; then
            SUBTYPE=$(grep "^subtype:" self_heal_result.txt | cut -d' ' -f2)
            COST=$(grep "^cost_usd:" self_heal_result.txt | cut -d' ' -f2)
            TURNS=$(grep "^turns:" self_heal_result.txt | cut -d' ' -f2)

            if [ "$SUBTYPE" = "success" ]; then
              BODY="Auto-fix cycle complete. Cost: \$$COST | Turns: $TURNS"
            elif [ "$SUBTYPE" = "error_max_budget_usd" ]; then
              BODY="Auto-fix hit the \$15.00 budget cap after $TURNS turns. Human review required."
            elif [ "$SUBTYPE" = "error_max_turns" ]; then
              BODY="Auto-fix hit the 50-turn limit. Cost: \$$COST. Human review required."
            else
              BODY="Auto-fix stopped unexpectedly ($SUBTYPE). Cost: \$$COST. Human review required."
            fi

            gh pr comment ${{ steps.find-pr.outputs.pr_number }} \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi
